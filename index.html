<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데일리 삼국지 — 오늘의 삼국지</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ─────────── HEADER ─────────── -->
<header class="site-header">
  <div class="header-inner">
    <!-- Left decoration: Zhang Fei -->
    <div class="header-deco">
      <svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="zhf-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a1010"/><stop offset="100%" stop-color="#0a0402"/></linearGradient></defs>
        <rect width="100" height="160" rx="10" fill="url(#zhf-bg)"/>
        <rect x="0.5" y="0.5" width="99" height="159" rx="9.5" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.6"/>
        <!-- helmet -->
        <path d="M18,38 Q50,18 82,38 L78,46 Q50,28 22,46 Z" fill="#c0392b" opacity="0.8"/>
        <rect x="14" y="38" width="72" height="8" rx="2" fill="#a0302a" opacity="0.7"/>
        <!-- face: dark / fierce -->
        <ellipse cx="50" cy="72" rx="26" ry="28" fill="#8a5030"/>
        <ellipse cx="24" cy="72" rx="5" ry="8.5" fill="#8a5030"/>
        <ellipse cx="76" cy="72" rx="5" ry="8.5" fill="#8a5030"/>
        <!-- fierce eyes -->
        <ellipse cx="39" cy="66" rx="7" ry="5" fill="#050100"/>
        <ellipse cx="61" cy="66" rx="7" ry="5" fill="#050100"/>
        <path d="M30,58 Q39,64 48,58" stroke="#1a0400" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M52,58 Q61,64 70,58" stroke="#1a0400" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="50" cy="76" rx="3.5" ry="2.5" fill="#705040"/>
        <!-- fierce beard -->
        <path d="M16,83 Q12,108 16,128 Q30,140 50,144 Q70,140 84,128 Q88,108 84,83 Q68,92 50,94 Q32,92 16,83 Z" fill="#060200" opacity="0.95"/>
        <!-- serpent spear hint -->
        <line x1="50" y1="148" x2="50" y2="158" stroke="#c0392b" stroke-width="2"/>
        <text x="50" y="155" text-anchor="middle" font-family="serif" font-size="11" fill="#e05040" letter-spacing="1">張飛</text>
      </svg>
    </div>

    <div class="header-center">
      <h1>데일리 <em>삼국지</em></h1>
      <div class="header-tagline">삼국지연의 × 삼국지 정사 비교 탐구 — 매일 새로운 이야기</div>
      <div class="header-date" id="headerDate"></div>
    </div>

    <!-- Right decoration: Zhuge Liang -->
    <div class="header-deco">
      <svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="zgl-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#152b18"/><stop offset="100%" stop-color="#050e06"/></linearGradient></defs>
        <rect width="100" height="160" rx="10" fill="url(#zgl-bg)"/>
        <rect x="0.5" y="0.5" width="99" height="159" rx="9.5" fill="none" stroke="#27ae60" stroke-width="1.2" opacity="0.6"/>
        <!-- scholar hat -->
        <rect x="24" y="22" width="52" height="9" rx="4.5" fill="#1a1408" stroke="#27ae60" stroke-width="1" opacity="0.85"/>
        <rect x="32" y="14" width="36" height="10" rx="5" fill="#120f04" stroke="#27ae60" stroke-width="1" opacity="0.7"/>
        <!-- face: pale/wise -->
        <ellipse cx="50" cy="72" rx="25" ry="29" fill="#d8c4a8"/>
        <ellipse cx="25" cy="72" rx="5" ry="8" fill="#d8c4a8"/>
        <ellipse cx="75" cy="72" rx="5" ry="8" fill="#d8c4a8"/>
        <!-- wise eyes -->
        <ellipse cx="39" cy="65" rx="5.5" ry="3.8" fill="#080500"/>
        <ellipse cx="61" cy="65" rx="5.5" ry="3.8" fill="#080500"/>
        <circle cx="41" cy="64" r="1.4" fill="white" opacity="0.5"/>
        <circle cx="63" cy="64" r="1.4" fill="white" opacity="0.5"/>
        <path d="M33,57 Q39,54 45,57" stroke="#2a1a0a" stroke-width="2.2" fill="none"/>
        <path d="M55,57 Q61,54 67,57" stroke="#2a1a0a" stroke-width="2.2" fill="none"/>
        <ellipse cx="50" cy="74" rx="3" ry="2" fill="#b09878"/>
        <path d="M42,82 Q50,87 58,82" stroke="#885050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- feather fan -->
        <path d="M65,105 Q75,90 80,75 Q82,70 78,68 Q74,70 72,75 Q68,90 65,105 Z" fill="#d4c090" opacity="0.7"/>
        <path d="M65,105 Q72,88 78,72" stroke="#b0a060" stroke-width="0.8" fill="none"/>
        <text x="50" y="155" text-anchor="middle" font-family="serif" font-size="11" fill="#3abf6a" letter-spacing="1">諸葛亮</text>
      </svg>
    </div>
  </div>
</header>

<!-- ─────────── MAIN GRID ─────────── -->
<div class="main-wrap">
  <!-- LEFT: Today's Character -->
  <aside class="side-panel" id="characterPanel">
    <div class="panel-head">
      <span class="panel-head-icon">👤</span>
      <h2>오늘의 인물</h2>
    </div>
    <div id="charContent"></div>
  </aside>

  <!-- CENTER: Today's Episode -->
  <section class="center-panel" id="episodePanel">
    <div id="epContent"></div>
  </section>

  <!-- RIGHT: Today's Idiom -->
  <aside class="side-panel" id="idiomPanel">
    <div class="panel-head">
      <span class="panel-head-icon">📜</span>
      <h2>오늘의 삼국지 고사성어</h2>
    </div>
    <div id="idiomContent"></div>
  </aside>
</div>

<!-- ─────────── MAP MODAL ─────────── -->
<div class="map-modal" id="mapModal" onclick="handleModalClick(event)">
  <div class="map-modal-inner" onclick="event.stopPropagation()">
    <div class="map-modal-head">
      <div>
        <h2 id="mapTitle">세력도</h2>
        <div id="mapEraDesc" style="font-family:'Noto Sans KR',sans-serif;font-size:0.73rem;color:var(--text-muted);margin-top:4px;max-width:680px;line-height:1.5;"></div>
      </div>
      <button class="map-close-btn" onclick="closeMap()" title="닫기">✕</button>
    </div>
    <div class="map-svg-wrap">
      <svg class="map-svg" id="mapSvg" viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>

        <!-- Background -->
        <rect width="900" height="580" fill="#0c0806"/>

        <!-- 시대별 세력도 — openMap()에서 동적 렌더링 -->
        <g id="territories"></g>

        <!-- Yellow River (黃河) -->
        <path d="M 0,190 Q 60,178 120,172 Q 180,166 240,175 Q 290,183 330,182 Q 370,180 410,172 Q 460,162 510,152 Q 575,140 640,135 Q 710,130 780,138 Q 845,145 900,152"
          fill="none" stroke="#5588cc" stroke-width="2.5" opacity="0.65"/>
        <text x="130" y="167" font-family="serif" font-size="11" fill="#5588cc" opacity="0.7">黃河</text>

        <!-- Yangtze River (長江) -->
        <path d="M 90,365 Q 140,350 190,358 Q 240,366 290,370 Q 340,373 390,375 Q 440,376 490,373 Q 540,369 600,368 Q 660,367 720,372 Q 790,378 860,370 Q 885,367 900,364"
          fill="none" stroke="#4488bb" stroke-width="3" opacity="0.7"/>
        <text x="195" y="347" font-family="serif" font-size="11" fill="#4488bb" opacity="0.7">長江</text>

        <!-- Hanshui River (漢水) -->
        <path d="M 215,280 Q 280,305 340,338 Q 390,362 430,375"
          fill="none" stroke="#4488bb" stroke-width="1.8" opacity="0.5"/>

        <!-- CITIES -->
        <!-- 낙양(洛陽) - Han/Wei capital -->
        <g class="city-marker" data-name="낙양">
          <circle cx="450" cy="218" r="7" fill="#d4af37" stroke="#f0cf6a" stroke-width="1.5" opacity="0.9"/>
          <text x="450" y="207" text-anchor="middle" font-family="serif" font-size="11" fill="#f0cf6a">洛陽</text>
          <text x="450" y="197" text-anchor="middle" font-family="Noto Sans KR,sans-serif" font-size="9" fill="#d4af37" opacity="0.8">낙양</text>
        </g>
        <!-- 허창(許昌) - Wei capital -->
        <g class="city-marker" data-name="허창">
          <circle cx="505" cy="255" r="6" fill="#5090e0" stroke="#80b0ff" stroke-width="1.5" opacity="0.9"/>
          <text x="522" y="258" font-family="serif" font-size="11" fill="#80b0ff">許昌</text>
          <text x="522" y="269" font-family="Noto Sans KR,sans-serif" font-size="9" fill="#5090e0" opacity="0.8">허창</text>
        </g>
        <!-- 업(鄴) - Wei northern seat -->
        <g class="city-marker" data-name="업">
          <circle cx="568" cy="162" r="6" fill="#5090e0" stroke="#80b0ff" stroke-width="1.5" opacity="0.85"/>
          <text x="580" y="160" font-family="serif" font-size="11" fill="#80b0ff">鄴</text>
          <text x="580" y="172" font-family="Noto Sans KR,sans-serif" font-size="9" fill="#5090e0" opacity="0.8">업</text>
        </g>
        <!-- 장안(長安) - former Han capital -->
        <g class="city-marker" data-name="장안">
          <circle cx="218" cy="208" r="6" fill="#d4af37" stroke="#f0cf6a" stroke-width="1.5" opacity="0.85"/>
          <text x="218" y="197" text-anchor="middle" font-family="serif" font-size="11" fill="#f0cf6a">長安</text>
          <text x="218" y="187" text-anchor="middle" font-family="Noto Sans KR,sans-serif" font-size="9" fill="#d4af37" opacity="0.8">장안</text>
        </g>
        <!-- 성도(成都) - Shu capital -->
        <g class="city-marker" data-name="성도">
          <circle cx="128" cy="400" r="7" fill="#3abf6a" stroke="#60df90" stroke-width="1.5" opacity="0.9"/>
          <text x="128" y="389" text-anchor="middle" font-family="serif" font-size="11" fill="#60df90">成都</text>
          <text x="128" y="379" text-anchor="middle" font-family="Noto Sans KR,sans-serif" font-size="9" fill="#3abf6a" opacity="0.8">성도</text>
        </g>
        <!-- 한중(漢中) - Shu gateway -->
        <g class="city-marker" data-name="한중">
          <circle cx="230" cy="282" r="6" fill="#3abf6a" stroke="#60df90" stroke-width="1.5" opacity="0.85"/>
          <text x="230" y="271" text-anchor="middle" font-family="serif" font-size="11" fill="#60df90">漢中</text>
          <text x="230" y="261" text-anchor="middle" font-family="Noto Sans KR,sans-serif" font-size="9" fill="#3abf6a" opacity="0.8">한중</text>
        </g>
        <!-- 건업(建業) - Wu capital -->
        <g class="city-marker" data-name="건업">
          <circle cx="698" cy="328" r="7" fill="#e05040" stroke="#ff8070" stroke-width="1.5" opacity="0.9"/>
          <text x="698" y="317" text-anchor="middle" font-family="serif" font-size="11" fill="#ff8070">建業</text>
          <text x="698" y="307" text-anchor="middle" font-family="Noto Sans KR,sans-serif" font-size="9" fill="#e05040" opacity="0.8">건업</text>
        </g>
        <!-- 형주(荊州) - Contested -->
        <g class="city-marker" data-name="형주">
          <circle cx="435" cy="390" r="6.5" fill="#c0a030" stroke="#e0c050" stroke-width="1.5" opacity="0.9"/>
          <text x="435" y="379" text-anchor="middle" font-family="serif" font-size="11" fill="#e0c050">荊州</text>
          <text x="435" y="369" text-anchor="middle" font-family="Noto Sans KR,sans-serif" font-size="9" fill="#c0a030" opacity="0.8">형주</text>
        </g>
        <!-- 양양(襄陽) -->
        <g class="city-marker" data-name="양양">
          <circle cx="435" cy="348" r="5" fill="#a08030" stroke="#c0a050" stroke-width="1.2" opacity="0.8"/>
          <text x="450" y="345" font-family="serif" font-size="10" fill="#c0a050" opacity="0.85">襄陽 양양</text>
        </g>

        <!-- BATTLE SITES (★) -->
        <!-- 관도(官渡) -->
        <g class="battle-marker" data-name="관도">
          <text x="468" y="232" text-anchor="middle" font-family="serif" font-size="14" fill="#ff6040" opacity="0.9">★</text>
          <text x="468" y="245" text-anchor="middle" font-family="Noto Sans KR,sans-serif" font-size="9" fill="#ff9070" opacity="0.8">관도(官渡)</text>
        </g>
        <!-- 적벽(赤壁) -->
        <g class="battle-marker" data-name="적벽">
          <text x="490" y="388" text-anchor="middle" font-family="serif" font-size="14" fill="#ff6040" opacity="0.9">★</text>
          <text x="490" y="400" text-anchor="middle" font-family="Noto Sans KR,sans-serif" font-size="9" fill="#ff9070" opacity="0.8">적벽(赤壁)</text>
        </g>
        <!-- 장판파(長坂坡) -->
        <g class="battle-marker" data-name="장판파">
          <text x="448" y="358" text-anchor="middle" font-family="serif" font-size="12" fill="#ffaa40" opacity="0.85">★</text>
          <text x="448" y="369" text-anchor="middle" font-family="Noto Sans KR,sans-serif" font-size="8" fill="#ffaa40" opacity="0.8">장판파</text>
        </g>
        <!-- 오장원(五丈原) -->
        <g class="battle-marker" data-name="오장원">
          <text x="248" y="242" text-anchor="middle" font-family="serif" font-size="12" fill="#ffaa40" opacity="0.85">★</text>
          <text x="248" y="253" text-anchor="middle" font-family="Noto Sans KR,sans-serif" font-size="8" fill="#ffaa40" opacity="0.8">오장원</text>
        </g>
        <!-- 이릉(夷陵) -->
        <g class="battle-marker" data-name="이릉">
          <text x="365" y="402" text-anchor="middle" font-family="serif" font-size="12" fill="#ffaa40" opacity="0.85">★</text>
          <text x="365" y="413" text-anchor="middle" font-family="Noto Sans KR,sans-serif" font-size="8" fill="#ffaa40" opacity="0.8">이릉</text>
        </g>
        <!-- 가정(街亭) -->
        <g class="battle-marker" data-name="가정">
          <text x="205" y="262" text-anchor="middle" font-family="serif" font-size="12" fill="#ffaa40" opacity="0.85">★</text>
          <text x="205" y="273" text-anchor="middle" font-family="Noto Sans KR,sans-serif" font-size="8" fill="#ffaa40" opacity="0.8">가정</text>
        </g>
        <!-- 탁현(涿縣) -->
        <g class="battle-marker" data-name="탁현">
          <circle cx="560" cy="108" r="4.5" fill="#8080a0" stroke="#a0a0c0" stroke-width="1" opacity="0.8"/>
          <text x="575" y="112" font-family="Noto Sans KR,sans-serif" font-size="9" fill="#a0a0c0" opacity="0.8">탁현(涿縣)</text>
        </g>
        <!-- 맥성(麥城) -->
        <g class="battle-marker" data-name="맥성">
          <text x="462" y="368" text-anchor="middle" font-family="serif" font-size="11" fill="#ff8050" opacity="0.8">★</text>
          <text x="462" y="378" text-anchor="middle" font-family="Noto Sans KR,sans-serif" font-size="8" fill="#ff8050" opacity="0.75">맥성</text>
        </g>

        <!-- Highlight group (filled dynamically) -->
        <g id="mapHighlights"></g>

        <!-- Compass rose -->
        <g transform="translate(855,50)">
          <text x="0" y="-12" text-anchor="middle" font-family="serif" font-size="10" fill="#d4af37" opacity="0.5">北</text>
          <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="10" fill="#d4af37" opacity="0.5">南</text>
          <text x="-14" y="6" text-anchor="middle" font-family="serif" font-size="10" fill="#d4af37" opacity="0.5">西</text>
          <text x="14" y="6" text-anchor="middle" font-family="serif" font-size="10" fill="#d4af37" opacity="0.5">東</text>
          <line x1="0" y1="-8" x2="0" y2="14" stroke="#d4af37" stroke-width="0.8" opacity="0.4"/>
          <line x1="-8" y1="3" x2="10" y2="3" stroke="#d4af37" stroke-width="0.8" opacity="0.4"/>
        </g>
      </svg>
    </div>
    <div class="map-episode-note" id="mapEpNote"></div>
    <div class="map-legend" id="mapLegend">
      <div class="leg-item"><span style="color:#ff6040;font-size:1rem">★</span> 주요 전투지</div>
      <div class="leg-item"><span style="color:#f0cf6a;font-size:1rem">◎</span> 오늘의 에피소드 무대</div>
      <div class="leg-item"><span style="color:#5588cc;font-size:0.85rem">━━</span> 황하(黃河)</div>
      <div class="leg-item"><span style="color:#4488bb;font-size:0.85rem">━━</span> 장강(長江)</div>
    </div>
  </div>
</div>

<!-- ─────────── FOOTER ─────────── -->
<footer class="site-footer">

</footer>

  <script src="data/characters.js"></script>
  <script src="data/episodes.js"></script>
  <script src="data/idioms.js"></script>
  <script src="data/map-data.js"></script>
  <script src="js/portrait.js"></script>
  <script src="js/render.js"></script>
  <script src="js/map.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
