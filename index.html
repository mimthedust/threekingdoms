<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데일리 삼국지 — 오늘의 삼국지</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep: #0a0604; --bg-dark: #140c08; --bg-panel: #1e1209; --bg-card: #261508;
      --primary: #c0392b; --gold: #d4af37; --gold-light: #f0cf6a; --gold-dark: #9a7b1e;
      --text: #f0dcc8; --text-dim: #c0a888; --text-muted: #887060;
      --border: rgba(212,175,55,0.28); --border-bright: rgba(212,175,55,0.55);
      --wei: #5090e0; --shu: #3abf6a; --wu: #e05040;
      --radius: 8px; --panel-w: 310px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg-deep); color: var(--text); font-family: 'Noto Serif KR', serif; min-height: 100vh; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

    /* ── HEADER ── */
    .site-header {
      background: linear-gradient(180deg, #080402 0%, #1c0c06 60%, #120a06 100%);
      border-bottom: 2px solid var(--border-bright);
      position: relative; overflow: hidden;
    }
    .site-header::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 120% at 50% 0%, rgba(192,57,43,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-inner {
      max-width: 1440px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; min-height: 150px;
    }
    .header-deco { width: 110px; flex-shrink: 0; }
    .header-deco svg { width: 100%; filter: drop-shadow(0 0 12px rgba(212,175,55,0.35)); }
    .header-center { text-align: center; flex: 1; padding: 24px 0; }
    .header-center h1 {
      font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 900; color: var(--gold);
      text-shadow: 0 0 40px rgba(212,175,55,0.45), 0 2px 6px rgba(0,0,0,0.9);
      letter-spacing: 0.18em; line-height: 1.1;
    }
    .header-center h1 em { color: var(--primary); font-style: normal; }
    .header-tagline {
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.75rem;
      color: var(--text-muted); letter-spacing: 0.22em; margin-top: 8px;
    }
    .header-date {
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.9rem;
      color: var(--gold-light); margin-top: 10px; letter-spacing: 0.08em;
    }

    /* ── MAIN GRID ── */
    .main-wrap {
      max-width: 1440px; margin: 0 auto;
      display: grid; grid-template-columns: var(--panel-w) 1fr var(--panel-w);
      gap: 14px; padding: 16px 16px 24px;
      min-height: calc(100vh - 180px);
    }

    /* ── PANELS ── */
    .side-panel {
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-dark) 100%);
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; display: flex; flex-direction: column;
    }
    .center-panel {
      background: linear-gradient(180deg, #16100a 0%, var(--bg-deep) 100%);
      border: 1px solid var(--border-bright); border-radius: var(--radius);
      overflow: hidden;
    }
    .panel-head {
      background: linear-gradient(135deg, rgba(212,175,55,0.12) 0%, rgba(212,175,55,0.04) 100%);
      border-bottom: 1px solid var(--border);
      padding: 13px 18px; display: flex; align-items: center; gap: 10px;
    }
    .panel-head h2 { font-size: 0.92rem; font-weight: 700; color: var(--gold); letter-spacing: 0.12em; }
    .panel-head-icon { opacity: 0.75; font-size: 1.1rem; }

    /* ── CHARACTER PANEL ── */
    .char-portrait-area { display: flex; justify-content: center; padding: 20px 20px 8px; }
    .char-portrait-area svg { width: 120px; height: 150px; filter: drop-shadow(0 6px 16px rgba(0,0,0,0.6)); border-radius: 10px; }
    .char-name-area { text-align: center; padding: 6px 20px 0; }
    .char-ko { font-size: 1.7rem; font-weight: 900; color: var(--gold-light); }
    .char-hanja { font-size: 0.9rem; color: var(--text-muted); margin-left: 6px; }
    .char-subtitle { font-family: 'Noto Sans KR', sans-serif; font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
    .char-dates { font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; color: var(--text-dim); margin-top: 5px; }
    .faction-chip {
      display: inline-block; padding: 2px 12px; border-radius: 20px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.68rem; font-weight: 600;
      margin-top: 8px; letter-spacing: 0.06em;
    }
    .chip-shu { background: rgba(58,191,106,0.12); color: var(--shu); border: 1px solid rgba(58,191,106,0.35); }
    .chip-wei { background: rgba(80,144,224,0.12); color: var(--wei); border: 1px solid rgba(80,144,224,0.35); }
    .chip-wu  { background: rgba(224,80,64,0.12);  color: var(--wu);  border: 1px solid rgba(224,80,64,0.35); }
    .chip-other { background: rgba(180,160,100,0.1); color: #c8a860; border: 1px solid rgba(180,160,100,0.3); }
    .char-divider { height: 1px; background: var(--border); margin: 14px 20px; }
    .char-bio {
      padding: 0 20px 14px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.8rem;
      color: var(--text-dim); line-height: 1.85;
    }
    .char-ach-title {
      font-size: 0.82rem; color: var(--gold); margin: 0 20px 10px;
      padding-bottom: 6px; border-bottom: 1px solid var(--border);
      letter-spacing: 0.08em;
    }
    .char-ach-list { padding: 0 20px 14px; }
    .char-ach-item {
      display: flex; align-items: flex-start; gap: 7px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem;
      color: var(--text-dim); line-height: 1.75; margin-bottom: 7px;
    }
    .char-ach-item::before { content: '◆'; color: var(--gold-dark); font-size: 0.58rem; margin-top: 5px; flex-shrink: 0; }
    .char-quote {
      margin: 0 20px 20px; padding: 11px 15px;
      background: rgba(212,175,55,0.04); border-left: 3px solid var(--gold-dark);
      border-radius: 0 4px 4px 0;
    }
    .char-quote-cn { font-size: 0.82rem; color: var(--gold-light); line-height: 1.6; font-style: italic; }
    .char-quote-ko { font-family: 'Noto Sans KR', sans-serif; font-size: 0.73rem; color: var(--text-muted); margin-top: 5px; line-height: 1.6; }

    /* ── EPISODE (CENTER) PANEL ── */
    .ep-header {
      background: linear-gradient(135deg, rgba(192,57,43,0.18) 0%, transparent 100%);
      border-bottom: 1px solid var(--border-bright);
      padding: 22px 28px 18px;
    }
    .ep-label { font-family: 'Noto Sans KR', sans-serif; font-size: 0.72rem; color: var(--primary); letter-spacing: 0.22em; font-weight: 600; margin-bottom: 8px; }
    .ep-title { font-size: clamp(1.6rem, 3vw, 2.1rem); font-weight: 900; color: var(--gold-light); line-height: 1.2; }
    .ep-title-hanja { font-size: 1rem; color: var(--text-muted); margin-left: 12px; font-weight: 400; }
    .ep-meta { display: flex; align-items: center; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
    .ep-year { font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; color: var(--text-muted); }
    .ep-sep { width: 1px; height: 14px; background: var(--border); }
    .map-btn {
      margin-left: auto;
      padding: 8px 18px;
      background: linear-gradient(135deg, rgba(212,175,55,0.18) 0%, rgba(212,175,55,0.08) 100%);
      border: 1px solid var(--gold-dark); border-radius: 4px;
      color: var(--gold); font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.06em; white-space: nowrap;
    }
    .map-btn:hover { background: linear-gradient(135deg, rgba(212,175,55,0.32) 0%, rgba(212,175,55,0.18) 100%); border-color: var(--gold); color: var(--gold-light); }
    .ep-body { padding: 24px 28px; }
    .sec-label { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .sec-tag {
      display: inline-block; padding: 3px 11px; border-radius: 3px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    }
    .tag-romance { background: rgba(192,57,43,0.18); color: #e85050; border: 1px solid rgba(192,57,43,0.35); }
    .tag-history { background: rgba(80,144,224,0.14); color: var(--wei); border: 1px solid rgba(80,144,224,0.3); }
    .tag-fact    { background: rgba(58,191,106,0.14); color: var(--shu); border: 1px solid rgba(58,191,106,0.3); }
    .tag-fiction { background: rgba(192,57,43,0.14); color: #e85050; border: 1px solid rgba(192,57,43,0.3); }
    .tag-partial { background: rgba(212,175,55,0.14); color: var(--gold); border: 1px solid rgba(212,175,55,0.3); }
    .sec-name { font-size: 0.88rem; color: var(--text-dim); }
    .ep-text {
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.86rem;
      color: var(--text-dim); line-height: 1.95; margin-bottom: 22px; white-space: pre-line;
    }
    .ep-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--border-bright) 25%, var(--border-bright) 75%, transparent 100%);
      margin: 22px 0; position: relative;
    }
    .ep-divider::before {
      content: '⚔'; position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      background: #16100a; padding: 0 14px;
      color: var(--gold-dark); font-size: 0.85rem;
    }
    .verdict-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .verdict-label { font-family: 'Noto Sans KR', sans-serif; font-size: 0.76rem; color: var(--text-muted); }
    .source-box {
      background: rgba(80,144,224,0.07); border: 1px solid rgba(80,144,224,0.2);
      border-radius: 6px; padding: 14px 18px; margin-top: 14px;
    }
    .source-box-title { font-size: 0.78rem; color: var(--wei); margin-bottom: 8px; letter-spacing: 0.06em; }
    .source-ref { font-family: 'Noto Sans KR', sans-serif; font-size: 0.8rem; color: #80b0ff; margin-bottom: 6px; }
    .source-note { font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; color: var(--text-muted); line-height: 1.75; margin-top: 8px; }

    /* ── IDIOM PANEL ── */
    .idiom-hanja-area { text-align: center; padding: 22px 20px 14px; }
    .idiom-hanja-big {
      font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 900; color: var(--gold);
      letter-spacing: 0.2em; text-shadow: 0 0 24px rgba(212,175,55,0.35);
    }
    .idiom-ko { font-size: 1.05rem; color: var(--gold-light); margin-top: 10px; font-weight: 700; }
    .idiom-brief { font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }
    .hanja-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; padding: 0 16px 16px; }
    .hanja-cell {
      background: rgba(212,175,55,0.05); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 5px; text-align: center;
    }
    .hj-char { font-size: 1.55rem; color: var(--gold-light); display: block; line-height: 1; margin-bottom: 5px; }
    .hj-read { font-family: 'Noto Sans KR', sans-serif; font-size: 0.68rem; color: var(--primary); font-weight: 700; display: block; }
    .hj-mean { font-family: 'Noto Sans KR', sans-serif; font-size: 0.62rem; color: var(--text-muted); display: block; margin-top: 3px; line-height: 1.35; }
    .idiom-sec { padding: 0 20px 14px; }
    .idiom-sec-title {
      font-size: 0.82rem; color: var(--gold); margin-bottom: 9px;
      padding-bottom: 6px; border-bottom: 1px solid var(--border); letter-spacing: 0.1em;
    }
    .idiom-sec-body { font-family: 'Noto Sans KR', sans-serif; font-size: 0.79rem; color: var(--text-dim); line-height: 1.88; white-space: pre-line; }
    .idiom-use-box {
      margin: 0 20px 20px; padding: 11px 15px;
      background: rgba(212,175,55,0.05); border: 1px solid var(--border); border-radius: 6px;
    }
    .idiom-use-label { font-family: 'Noto Sans KR', sans-serif; font-size: 0.68rem; color: var(--gold-dark); font-weight: 700; letter-spacing: 0.1em; margin-bottom: 6px; }
    .idiom-use-text { font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; color: var(--text-muted); line-height: 1.72; }

    /* ── MAP MODAL ── */
    .map-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.88); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
    .map-modal.open { display: flex; }
    .map-modal-inner {
      background: linear-gradient(180deg, #1a0e08 0%, #100806 100%);
      border: 2px solid var(--border-bright); border-radius: 12px;
      width: 95vw; max-width: 980px; max-height: 92vh; overflow: auto;
      box-shadow: 0 24px 70px rgba(0,0,0,0.85), 0 0 50px rgba(212,175,55,0.08);
    }
    .map-modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 22px; border-bottom: 1px solid var(--border);
    }
    .map-modal-head h2 { font-size: 1rem; color: var(--gold); letter-spacing: 0.12em; }
    .map-close-btn {
      width: 30px; height: 30px; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 50%;
      color: var(--text-muted); cursor: pointer; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .map-close-btn:hover { background: rgba(192,57,43,0.3); color: white; border-color: var(--primary); }
    .map-svg-wrap { padding: 12px 16px; }
    .map-svg { width: 100%; height: auto; border-radius: 6px; border: 1px solid var(--border); display: block; }
    .map-episode-note { padding: 10px 22px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.8rem; color: var(--gold); border-top: 1px solid var(--border); }
    .map-legend { display: flex; gap: 18px; padding: 12px 22px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .leg-item { display: flex; align-items: center; gap: 7px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.75rem; color: var(--text-muted); }
    .leg-dot { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }

    /* ── FOOTER ── */
    .site-footer { border-top: 1px solid var(--border); padding: 18px; text-align: center; font-family: 'Noto Sans KR', sans-serif; font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.06em; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .side-panel { animation: fadeUp 0.45s ease-out forwards; }
    .center-panel { animation: fadeUp 0.45s ease-out 0.08s forwards; opacity: 0; }
    #idiomPanel { animation-delay: 0.16s; }

    @keyframes pulse { 0%,100% { opacity: 0.6; r: 10; } 50% { opacity: 1; r: 13; } }
    .map-highlight { animation: pulse 1.4s ease-in-out infinite; }

    @media (max-width: 1100px) { :root { --panel-w: 270px; } }
    @media (max-width: 900px) {
      .main-wrap { grid-template-columns: 1fr; }
      .header-deco { display: none; }
    }
  </style>
</head>
<body>

<!-- ─────────── HEADER ─────────── -->
<header class="site-header">
  <div class="header-inner">
    <!-- Left decoration: Zhang Fei -->
    <div class="header-deco">
      <svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="zhf-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a1010"/><stop offset="100%" stop-color="#0a0402"/></linearGradient></defs>
        <rect width="100" height="160" rx="10" fill="url(#zhf-bg)"/>
        <rect x="0.5" y="0.5" width="99" height="159" rx="9.5" fill="none" stroke="#c0392b" stroke-width="1.2" opacity="0.6"/>
        <!-- helmet -->
        <path d="M18,38 Q50,18 82,38 L78,46 Q50,28 22,46 Z" fill="#c0392b" opacity="0.8"/>
        <rect x="14" y="38" width="72" height="8" rx="2" fill="#a0302a" opacity="0.7"/>
        <!-- face: dark / fierce -->
        <ellipse cx="50" cy="72" rx="26" ry="28" fill="#8a5030"/>
        <ellipse cx="24" cy="72" rx="5" ry="8.5" fill="#8a5030"/>
        <ellipse cx="76" cy="72" rx="5" ry="8.5" fill="#8a5030"/>
        <!-- fierce eyes -->
        <ellipse cx="39" cy="66" rx="7" ry="5" fill="#050100"/>
        <ellipse cx="61" cy="66" rx="7" ry="5" fill="#050100"/>
        <path d="M30,58 Q39,64 48,58" stroke="#1a0400" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M52,58 Q61,64 70,58" stroke="#1a0400" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="50" cy="76" rx="3.5" ry="2.5" fill="#705040"/>
        <!-- fierce beard -->
        <path d="M16,83 Q12,108 16,128 Q30,140 50,144 Q70,140 84,128 Q88,108 84,83 Q68,92 50,94 Q32,92 16,83 Z" fill="#060200" opacity="0.95"/>
        <!-- serpent spear hint -->
        <line x1="50" y1="148" x2="50" y2="158" stroke="#c0392b" stroke-width="2"/>
        <text x="50" y="155" text-anchor="middle" font-family="serif" font-size="11" fill="#e05040" letter-spacing="1">張飛</text>
      </svg>
    </div>

    <div class="header-center">
      <h1>데일리 <em>삼국지</em></h1>
      <div class="header-tagline">삼국지연의 × 삼국지 정사 비교 탐구 — 매일 새로운 이야기</div>
      <div class="header-date" id="headerDate"></div>
    </div>

    <!-- Right decoration: Zhuge Liang -->
    <div class="header-deco">
      <svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="zgl-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#152b18"/><stop offset="100%" stop-color="#050e06"/></linearGradient></defs>
        <rect width="100" height="160" rx="10" fill="url(#zgl-bg)"/>
        <rect x="0.5" y="0.5" width="99" height="159" rx="9.5" fill="none" stroke="#27ae60" stroke-width="1.2" opacity="0.6"/>
        <!-- scholar hat -->
        <rect x="24" y="22" width="52" height="9" rx="4.5" fill="#1a1408" stroke="#27ae60" stroke-width="1" opacity="0.85"/>
        <rect x="32" y="14" width="36" height="10" rx="5" fill="#120f04" stroke="#27ae60" stroke-width="1" opacity="0.7"/>
        <!-- face: pale/wise -->
        <ellipse cx="50" cy="72" rx="25" ry="29" fill="#d8c4a8"/>
        <ellipse cx="25" cy="72" rx="5" ry="8" fill="#d8c4a8"/>
        <ellipse cx="75" cy="72" rx="5" ry="8" fill="#d8c4a8"/>
        <!-- wise eyes -->
        <ellipse cx="39" cy="65" rx="5.5" ry="3.8" fill="#080500"/>
        <ellipse cx="61" cy="65" rx="5.5" ry="3.8" fill="#080500"/>
        <circle cx="41" cy="64" r="1.4" fill="white" opacity="0.5"/>
        <circle cx="63" cy="64" r="1.4" fill="white" opacity="0.5"/>
        <path d="M33,57 Q39,54 45,57" stroke="#2a1a0a" stroke-width="2.2" fill="none"/>
        <path d="M55,57 Q61,54 67,57" stroke="#2a1a0a" stroke-width="2.2" fill="none"/>
        <ellipse cx="50" cy="74" rx="3" ry="2" fill="#b09878"/>
        <path d="M42,82 Q50,87 58,82" stroke="#885050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- feather fan -->
        <path d="M65,105 Q75,90 80,75 Q82,70 78,68 Q74,70 72,75 Q68,90 65,105 Z" fill="#d4c090" opacity="0.7"/>
        <path d="M65,105 Q72,88 78,72" stroke="#b0a060" stroke-width="0.8" fill="none"/>
        <text x="50" y="155" text-anchor="middle" font-family="serif" font-size="11" fill="#3abf6a" letter-spacing="1">諸葛亮</text>
      </svg>
    </div>
  </div>
</header>

<!-- ─────────── MAIN GRID ─────────── -->
<div class="main-wrap">
  <!-- LEFT: Today's Character -->
  <aside class="side-panel" id="characterPanel">
    <div class="panel-head">
      <span class="panel-head-icon">👤</span>
      <h2>오늘의 인물</h2>
    </div>
    <div id="charContent"></div>
  </aside>

  <!-- CENTER: Today's Episode -->
  <section class="center-panel" id="episodePanel">
    <div id="epContent"></div>
  </section>

  <!-- RIGHT: Today's Idiom -->
  <aside class="side-panel" id="idiomPanel">
    <div class="panel-head">
      <span class="panel-head-icon">📜</span>
      <h2>오늘의 삼국지 고사성어</h2>
    </div>
    <div id="idiomContent"></div>
  </aside>
</div>

<!-- ─────────── MAP MODAL ─────────── -->
<div class="map-modal" id="mapModal" onclick="handleModalClick(event)">
  <div class="map-modal-inner" onclick="event.stopPropagation()">
    <div class="map-modal-head">

function getDayIndex(len) {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  const day = Math.floor(diff / 86400000);
  return day % len;
}

function renderCharacter(char) {
  const chipClass = 'chip-' + (char.faction === 'other' ? 'other' : char.faction);
  const achItems = char.achievements.map(a => `<div class="char-ach-item">${a}</div>`).join('');
  const quoteHtml = char.quote ? `
    <div class="char-quote">
      <div class="char-quote-cn">${char.quote}</div>
      <div class="char-quote-ko">${char.quoteKo}</div>
    </div>` : '';

  document.getElementById('charContent').innerHTML = `
    <div class="char-portrait-area">${generatePortrait(char)}</div>
    <div class="char-name-area">
      <span class="char-ko">${char.name}</span><span class="char-hanja">${char.hanja}</span>
      <div class="char-subtitle">${char.subtitle}</div>
      <div class="char-dates">${char.born} ~ ${char.died}</div>
      <span class="faction-chip ${chipClass}">${char.factionName}</span>
    </div>
    <div class="char-divider"></div>
    <div class="char-bio">${char.bio}</div>
    <div class="char-ach-title">◈ 주요 활약상</div>
    <div class="char-ach-list">${achItems}</div>
    ${quoteHtml}
  `;
}

function verdictTag(v) {
  const map = {
    '허구': '<span class="sec-tag tag-fiction">연의 창작</span>',
    '사실': '<span class="sec-tag tag-fact">정사 일치</span>',
    '부분사실': '<span class="sec-tag tag-partial">부분 사실</span>'
  };
  return map[v] || '';
}

function renderEpisode(ep) {
  const sourceHtml = ep.history.source ? `
    <div class="source-box">
      <div class="source-box-title">▶ 정사 출전(出典)</div>
      <div class="source-ref">📖 ${ep.history.source}</div>
      ${ep.history.sourceNote ? `<div class="source-note">※ ${ep.history.sourceNote}</div>` : ''}
    </div>` : '';

  document.getElementById('epContent').innerHTML = `
    <div class="ep-header">
      <div class="ep-label">오늘의 에피소드 — 삼국지연의</div>
      <div class="ep-title">${ep.title}<span class="ep-title-hanja">${ep.hanja}</span></div>
      <div class="ep-meta">
        <span class="ep-year">⏱ ${ep.year}</span>
        <div class="ep-sep"></div>
        <span class="ep-year">${ep.period}</span>
        <button class="map-btn" onclick="openMap(${ep.id})">🗺 지도로 보기</button>
      </div>
    </div>
    <div class="ep-body">
      <div class="sec-label">
        <span class="sec-tag tag-romance">연의(演義)</span>
        <span class="sec-name">삼국지연의의 이야기</span>
      </div>
      <div class="ep-text">${ep.romance}</div>

      <div class="ep-divider"></div>

      <div class="sec-label">
        <span class="sec-tag tag-history">정사(正史)</span>
        <span class="sec-name">삼국지 정사와의 비교</span>
      </div>
      <div class="verdict-row">
        <span class="verdict-label">사실 여부:</span>
        ${verdictTag(ep.history.verdict)}
      </div>
      <div class="ep-text">${ep.history.content}</div>
      ${sourceHtml}
    </div>
  `;
}

function renderIdiom(idiom) {
  const hanjaGrid = idiom.chars.filter(c => c.char && c.char !== '·' && c.char !== '').map(c => `
    <div class="hanja-cell">
      <span class="hj-char">${c.char}</span>
      <span class="hj-read">${c.reading}</span>
      <span class="hj-mean">${c.meaning}</span>
    </div>`).join('');

  document.getElementById('idiomContent').innerHTML = `
    <div class="idiom-hanja-area">
      <div class="idiom-hanja-big">${idiom.hanja.replace('·','')}</div>
      <div class="idiom-ko">${idiom.term}</div>
      <div class="idiom-brief">${idiom.meaning}</div>
    </div>
    <div class="hanja-grid">${hanjaGrid}</div>
    <div class="idiom-sec">
      <div class="idiom-sec-title">◈ 유래 이야기</div>
      <div class="idiom-sec-body">${idiom.origin}</div>
    </div>
    <div class="idiom-use-box">
      <div class="idiom-use-label">▶ 현대적 용례</div>
      <div class="idiom-use-text">${idiom.modernUse}</div>
    </div>
  `;
}

function renderDate() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]}요일)`;
}

const LOCATION_COORDS = {
  '탁현(涿縣)':[556,108], '낙양(洛陽)':[450,218], '허창(許昌)':[505,255],
  '업(鄴)':[568,162], '장안(長安)':[218,208], '성도(成都)':[128,400],
  '한중(漢中)':[230,282], '건업(建業)':[698,328], '형주(荊州)':[435,390],
  '양양(襄陽)':[435,348], '관도(官渡)':[468,232], '적벽(赤壁)':[490,388],
  '장판파(長坂坡)':[448,358], '오장원':[248,242], '이릉':[365,402],
  '가정':[205,262], '맥성':[462,368]
};

function renderTerritories(eraKey) {
  const era = MAP_ERAS[eraKey] || MAP_ERAS.three_kingdoms;
  const ns = 'http://www.w3.org/2000/svg';
  const g = document.getElementById('territories');
  g.innerHTML = '';

  era.territories.forEach(t => {
    const poly = document.createElementNS(ns, 'polygon');
    poly.setAttribute('points', t.points);
    poly.setAttribute('fill', t.fill);
    poly.setAttribute('stroke', t.stroke);
    poly.setAttribute('stroke-width', t.sw || 1.5);
    g.appendChild(poly);

    if (t.ls > 0 && t.lx > 0) {
      const txt = document.createElementNS(ns, 'text');
      txt.setAttribute('x', t.lx); txt.setAttribute('y', t.ly);
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('font-family', 'serif');
      txt.setAttribute('font-size', t.ls);
      txt.setAttribute('fill', t.lc);
      txt.setAttribute('opacity', t.lo);
      txt.setAttribute('font-weight', 'bold');
      txt.textContent = t.hanja;
      g.appendChild(txt);
    }
  });

  if (era.stateLabels) {
    era.stateLabels.forEach(sl => {
      const txt = document.createElementNS(ns, 'text');
      txt.setAttribute('x', sl.x); txt.setAttribute('y', sl.y);
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('font-family', 'serif');
      txt.setAttribute('font-size', 13);
      txt.setAttribute('fill', '#c8a830');
      txt.setAttribute('opacity', '0.42');
      txt.textContent = sl.t;
      g.appendChild(txt);
    });
  }

  // 범례 업데이트
  const legend = document.getElementById('mapLegend');
  const fixed = `
    <div class="leg-item"><span style="color:#ff6040;font-size:1rem">★</span> 주요 전투지</div>
    <div class="leg-item"><span style="color:#f0cf6a;font-size:1rem">◎</span> 오늘의 에피소드 무대</div>
    <div class="leg-item"><span style="color:#5588cc;font-size:0.85rem">━━</span> 황하(黃河)</div>
    <div class="leg-item"><span style="color:#4488bb;font-size:0.85rem">━━</span> 장강(長江)</div>`;
  const dynItems = (era.legendItems || []).map(li =>
    `<div class="leg-item"><div class="leg-dot" style="background:${li.color};border:1px solid ${li.border}"></div>${li.label}</div>`
  ).join('');
  legend.innerHTML = dynItems + fixed;
}

let currentEpId = null;

function openMap(epId) {
  currentEpId = epId;
  const ep = EPISODES.find(e => e.id === epId);
  if (!ep) return;

  const eraKey = ep.mapEra || 'three_kingdoms';
  const era = MAP_ERAS[eraKey] || MAP_ERAS.three_kingdoms;

  document.getElementById('mapTitle').textContent = era.title;
  document.getElementById('mapEraDesc').textContent = era.desc;
  document.getElementById('mapEpNote').textContent =
    `📍 오늘의 에피소드 「${ep.title}」 무대: ${ep.mapLocations.join(', ')} | ${ep.mapNote}`;

  renderTerritories(eraKey);

  const hl = document.getElementById('mapHighlights');
  hl.innerHTML = '';
  ep.mapLocations.forEach(loc => {
    const coords = LOCATION_COORDS[loc];
    if (coords) {
      const [x, y] = coords;
      hl.innerHTML += `
        <circle class="map-highlight" cx="${x}" cy="${y}" r="12" fill="none" stroke="#f0cf6a" stroke-width="2.5" opacity="0.85"/>
        <circle cx="${x}" cy="${y}" r="4.5" fill="#f0cf6a" opacity="0.95"/>`;
    }
  });

  document.getElementById('mapModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeMap() {
  document.getElementById('mapModal').classList.remove('open');
  document.body.style.overflow = '';
}

function handleModalClick(e) {
  if (e.target === document.getElementById('mapModal')) closeMap();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMap(); });
